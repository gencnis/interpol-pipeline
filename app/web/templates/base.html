<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Interpol Pipeline{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 1rem 2rem; background: #f8f9fa; color: #212529; }
    nav { background: #343a40; color: #fff; padding: 0.6rem 2rem; margin: -1rem -2rem 1.5rem; display: flex; gap: 1rem; align-items: center; }
    nav a { color: #adb5bd; text-decoration: none; font-size: 0.9rem; }
    nav a:hover, nav a.active { color: #fff; }
    nav .brand { font-weight: 700; color: #fff; margin-right: auto; }
    h1 { margin-top: 0; font-size: 1.4rem; }
    h3 { font-size: 1rem; margin: 1rem 0 0.5rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th { background: #495057; color: #fff; padding: 0.5rem 0.75rem; text-align: left; font-size: 0.82rem; font-weight: 600; }
    td { padding: 0.45rem 0.75rem; border-bottom: 1px solid #dee2e6; font-size: 0.85rem; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f1f3f5; }
    .badge { display: inline-block; padding: 0.15rem 0.45rem; border-radius: 3px; font-size: 0.75rem; font-weight: 600; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-withdrawn { background: #f8d7da; color: #721c24; }
    .form-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
    .form-row input, .form-row select { padding: 0.35rem 0.6rem; border: 1px solid #ced4da; border-radius: 4px; font-size: 0.875rem; }
    .form-row button { padding: 0.35rem 0.8rem; background: #495057; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
    .form-row button:hover { background: #343a40; }
    a { color: #0d6efd; }
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }
    #alerts-panel { height: 340px; overflow-y: auto; background: #fff; border: 1px solid #dee2e6; border-radius: 6px; padding: 0.4rem; }
    .alarm { padding: 0.35rem 0.5rem; margin-bottom: 0.25rem; border-left: 4px solid #ffc107; background: #fff8e1; border-radius: 0 3px 3px 0; font-size: 0.82rem; line-height: 1.4; }
    .alarm.withdrawn { border-left-color: #dc3545; background: #fff0f0; }
    .alarm-id { font-weight: 600; }
    .alarm-ts { color: #868e96; margin-left: 0.4rem; }
    .diff-field { display: block; margin-top: 0.2rem; font-family: monospace; font-size: 0.78rem; }
    .diff-old { color: #dc3545; text-decoration: line-through; }
    .diff-new { color: #28a745; font-weight: 600; }
    .ws-status { font-size: 0.75rem; color: #6c757d; margin-left: 0.5rem; }
    .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 1.25rem; margin-top: 0.5rem; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Interpol Pipeline</span>
    <a href="/">Dashboard</a>
  </nav>
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
